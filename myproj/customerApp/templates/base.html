<html>
    <head>
        <title>My App</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                margin: 0;
                padding: 0;
                background-color: #0c41f1;
            }
            header {
                background-color: #f5f5f5;
                color: rgb(8, 0, 0);
                padding: 10px 20px;
            }
            nav ul {
                list-style-type: none;
                margin: 0;
                padding: 0;
            }
            nav ul li {
                display: inline;
                margin-right: 10px;
            }
            nav ul li a {
                color: rgb(0, 0, 0);
                text-decoration: none;
            }
            main {
                padding: 20px;
            }
            footer {
                background-color: #ee1010;
                color: white;
                text-align: center;
                padding: 10px 0;
                position: fixed;
                width: 100%;
                bottom: 0;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>My App</h1>
            <nav>
                <ul>
                    <li style="display: inline-block;"><div style="background-color: rgba(10, 221, 151, 0.5); padding: 5px 15px; border-radius: 5px; font-family: 'Times New Roman', Times, serif; font-weight: bolder;"><a href="/home">Home</a></div></li>
                    <li style="display: inline-block;"><div style="background-color: rgba(18, 140, 221, 0.733); padding: 5px 15px; border-radius: 5px; font-family: 'Times New Roman', Times, serif; font-weight: bolder;"><a href="/about">About</a></div></li>
                    <li style="display: inline-block;"><div style="background-color: rgba(43, 226, 6, 0.603); padding: 5px 15px; border-radius: 5px; font-family: 'Times New Roman', Times, serif; font-weight: bolder;"><a href="/contact">Contact</a></div></li>
                    <li style="display: inline-block;"><div style="background-color: rgba(255, 193, 7, 0.85); padding: 5px 15px; border-radius: 5px; font-family: 'Times New Roman', Times, serif; font-weight: bolder;"><a href="{% url 'add_customer' %}">Add Customer</a></div></li>
                    <li style="display: inline-block;"><div style="background-color: rgba(159, 122, 234, 0.8); padding: 5px 15px; border-radius: 5px; font-family: 'Times New Roman', Times, serif; font-weight: bolder;"><a href="{% url 'display_customer' %}">Display Students</a></div></li>
                </ul>
            </nav>
        </header>
        <main>
            {% block content %}
            {% endblock %}
        </main>
        <footer>
            <p>&copy; 2026 My App. All rights reserved.</p> 
        </footer>
    </body>
</html>
